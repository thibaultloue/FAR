# Déploiement production sur Vercel sans « Connected Git Repository » (méthode officielle CLI).
# Secrets GitHub (repo FAR → Settings → Secrets → Actions) :
#   VERCEL_TOKEN       → https://vercel.com/account/tokens
#   VERCEL_ORG_ID      → dans .vercel/project.json après `vercel link` en local sur ce repo
#   VERCEL_PROJECT_ID  → idem
# Alternative : Vercel → projet → Settings → Git → connecter GitHub (thibaultloue/FAR) pour retrouver les déploiements auto + Deploy Hooks.
name: Vercel Production

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
