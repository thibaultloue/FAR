# Contournement si Vercel ne reçoit plus les pushes Git (déploiement bloqué sur un vieux commit).
# 1) Vercel → ton projet → Settings → Git → Deploy Hooks → Create Hook (branche main).
# 2) GitHub → repo FAR → Settings → Secrets and variables → Actions → New repository secret
#    Nom : VERCEL_DEPLOY_HOOK   Valeur : l’URL complète du hook (https://api.vercel.com/...)
name: Trigger Vercel deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler le Deploy Hook Vercel
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "${HOOK}" ]; then
            echo "Secret VERCEL_DEPLOY_HOOK absent : ajoute-le (voir entête de ce workflow)."
            exit 1
          fi
          curl -fsS -X POST "${HOOK}"
          echo "OK — Vercel a reçu la demande de déploiement."
